spring:
  profiles:
    active: local
  application:
    name: liang-ai-agent
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    model:
      audio:
        speech: none
        transcription: none
      chat: dashscope
server:
  port: 8123
  servlet:
    context-path: /api

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.yml.liangaiagent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn